name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v3

    - name: Python 3.11 설정
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: 의존성 설치
      run: pip install -r requirements.txt

    - name: 데이터 다운로드
      run: python data/download_data.py

    - name: 모델 학습
      run: python src/train.py

    - name: 단위 테스트 실행
      run: python -m unittest tests/test_pipeline.py -v